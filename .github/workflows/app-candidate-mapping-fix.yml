name: Apply final candidate mapping fix

on:
  push:
    branches:
      - agent/fix-final-provider-candidate-mapping

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-final-provider-candidate-mapping
          fetch-depth: 0
      - name: Patch final provider candidate mapping
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scrapers/network_sources/db.py')
          text = path.read_text()

          old = '''def upsert_app(cur, v):
              if os.getenv("ENABLE_APP_CANDIDATE_WRITE", "1") != "1":
                  return "disabled"
              if not IDENTIFIER_RE.match(APP_TABLE) or not table_exists(cur, APP_TABLE):
                  return "missing_table"
              cols = table_columns(cur, APP_TABLE)
              app = {}
              mappings = [
                  (["name", "provider_name", "clinic_name", "title"], v["name"]),
                  (["normalized_name", "normalized_provider_name", "search_name"], v["normalized_name"]),
                  (["address", "full_address", "street_address"], v["address"]), (["city", "locality"], v["city"]),
                  (["state", "region", "province", "administrative_area"], v["region"]),
                  (["postal_code", "postalCode", "zip", "zipcode"], v["postal_code"]),
                  (["country", "country_name"], v["country"]), (["country_code", "countryCode"], v["country_code"]),
                  (["phone", "phone_number"], v["phone"]), (["website", "url"], v["website"]),
                  (["latitude", "lat"], v["latitude"]), (["longitude", "lng", "lon"], v["longitude"]),
                  (["category", "provider_category", "primary_category", "service_line", "service_type"], v["category"]),
                  (["dedupe_key", "external_key", "provider_key"], v["dedupe_key"]),
                  (["source", "data_source", "created_by"], v["raw"].get("source")),
                  (["source_query", "query"], v["source_query"]), (["confidence_score", "confidence"], v["confidence_score"]),
                  (["raw", "raw_data", "metadata"], json.dumps(v["raw"])),
              ]
              for names, value in mappings:
                  put(app, cols, names, value)
              if "status" in cols:
                  app["status"] = "new"
              if "created_at" in cols:
                  app["created_at"] = "__NOW__"
              if "updated_at" in cols:
                  app["updated_at"] = "__NOW__"
              if not app:
                  return "no_matching_columns"
          '''

          new = '''def build_app_values(cols, v):
              app = {}
              service_values = [v["category"]] if v.get("category") else []
              mappings = [
                  (["name", "provider_name", "clinic_name", "title"], v["name"]),
                  (["normalized_name", "normalized_provider_name", "search_name"], v["normalized_name"]),
                  (["source_kind"], v["raw"].get("source") or "provider_feeder"),
                  (["source_label"], v["source_query"] or "Provider feeder"),
                  (["address", "full_address", "street_address"], v["address"]),
                  (["city", "locality"], v["city"]),
                  (["admin_area", "state", "region", "province", "administrative_area"], v["region"]),
                  (["postal_code", "postalCode", "zip", "zipcode"], v["postal_code"]),
                  (["country", "country_name"], v["country"]),
                  (["country_code", "countryCode"], v["country_code"]),
                  (["phone", "phone_number"], v["phone"]),
                  (["website", "url"], v["website"]),
                  (["source_url"], clean(v["raw"].get("sourceUrl"))),
                  (["latitude", "lat"], v["latitude"]),
                  (["longitude", "lng", "lon"], v["longitude"]),
                  (["clinic_type", "category", "provider_category", "primary_category", "service_line", "service_type"], v["category"]),
                  (["services"], service_values),
                  (["categories"], service_values),
                  (["dedupe_key", "external_key", "provider_key"], v["dedupe_key"]),
                  (["source", "data_source", "created_by"], v["raw"].get("source")),
                  (["source_query", "query"], v["source_query"]),
                  (["confidence_score", "confidence"], v["confidence_score"]),
                  (["raw_source_data", "raw", "raw_data", "metadata"], psycopg2.extras.Json(v["raw"])),
              ]
              for names, value in mappings:
                  put(app, cols, names, value)
              if "status" in cols:
                  app["status"] = "candidate"
              if "created_at" in cols:
                  app["created_at"] = "__NOW__"
              if "updated_at" in cols:
                  app["updated_at"] = "__NOW__"
              if "last_seen" in cols:
                  app["last_seen"] = "__NOW__"
              return app


          def upsert_app(cur, v):
              if os.getenv("ENABLE_APP_CANDIDATE_WRITE", "1") != "1":
                  return "disabled"
              if not IDENTIFIER_RE.match(APP_TABLE) or not table_exists(cur, APP_TABLE):
                  return "missing_table"
              cols = table_columns(cur, APP_TABLE)
              app = build_app_values(cols, v)
              if not app:
                  return "no_matching_columns"
          '''

          if old not in text:
              raise SystemExit('expected upsert_app mapping block not found')
          text = text.replace(old, new)

          old_match = '''    match = next((c for c in ("dedupe_key", "external_key", "provider_key", "phone", "phone_number", "website", "url") if c in app), None)
              if match:
                  cur.execute(f"SELECT {q('id') if 'id' in cols else '1'} FROM {q(APP_TABLE)} WHERE {q(match)}=%s LIMIT 1", (app[match],))
                  existing = cur.fetchone()
                  if existing and "id" in cols:
                      sets, params = [], []
                      for col, value in app.items():
                          if col in ("id", "created_at"):
                              continue
                          if value == "__NOW__":
                              sets.append(f"{q(col)}=now()")
                          else:
                              params.append(value)
                              if col in ("confidence_score", "confidence"):
                                  sets.append(f"{q(col)}=GREATEST(COALESCE({q(col)},0),%s)")
                              else:
                                  sets.append(f"{q(col)}=CASE WHEN {q(col)} IS NULL OR {q(col)}::text='' THEN %s ELSE {q(col)} END")
                      params.append(existing[0])
                      cur.execute(f"UPDATE {q(APP_TABLE)} SET {', '.join(sets)} WHERE {q('id')}=%s", params)
                      return "updated"
          '''

          new_match = '''    existing = None
              for match in ("dedupe_key", "external_key", "provider_key", "source_url", "phone", "phone_number", "website", "url"):
                  if match not in app:
                      continue
                  cur.execute(f"SELECT {q('id') if 'id' in cols else '1'} FROM {q(APP_TABLE)} WHERE {q(match)}=%s LIMIT 1", (app[match],))
                  existing = cur.fetchone()
                  if existing:
                      break
              if not existing and all(name in app and name in cols for name in ("normalized_name", "address")):
                  cur.execute(
                      f"SELECT {q('id') if 'id' in cols else '1'} FROM {q(APP_TABLE)} WHERE lower({q('normalized_name')})=lower(%s) AND lower({q('address')})=lower(%s) LIMIT 1",
                      (app["normalized_name"], app["address"]),
                  )
                  existing = cur.fetchone()
              if existing and "id" in cols:
                  sets, params = [], []
                  for col, value in app.items():
                      if col in ("id", "created_at"):
                          continue
                      if value == "__NOW__":
                          sets.append(f"{q(col)}=now()")
                      else:
                          params.append(value)
                          if col in ("confidence_score", "confidence"):
                              sets.append(f"{q(col)}=GREATEST(COALESCE({q(col)},0),%s)")
                          else:
                              sets.append(f"{q(col)}=CASE WHEN {q(col)} IS NULL OR {q(col)}::text='' THEN %s ELSE {q(col)} END")
                  params.append(existing[0])
                  cur.execute(f"UPDATE {q(APP_TABLE)} SET {', '.join(sets)} WHERE {q('id')}=%s", params)
                  return "updated"
          '''

          if old_match not in text:
              raise SystemExit('expected upsert matching block not found')
          text = text.replace(old_match, new_match)
          path.write_text(text)

          test = Path('tests/test_app_candidate_mapping.py')
          test.write_text('''import sys\nimport unittest\nfrom pathlib import Path\n\nimport psycopg2.extras\n\nROOT = Path(__file__).resolve().parents[1]\nsys.path.insert(0, str(ROOT / "scrapers"))\n\nfrom network_sources.db import build_app_values, row_values\n\n\nclass AppCandidateMappingTests(unittest.TestCase):\n    def test_network_map_candidate_contract(self):\n        values = row_values({\n            "name": "Central Occupational Clinic",\n            "address": "10 Main Street",\n            "city": "Toronto",\n            "region": "Ontario",\n            "postalCode": "M5V 2T6",\n            "country": "Canada",\n            "phone": "+1 416 555 0100",\n            "website": "https://clinic.example",\n            "sourceUrl": "https://directory.example/central",\n            "services": "occupational medicine",\n            "sourceType": "pasted_url_scrape",\n            "sourceTag": "canada_registry",\n        })\n        columns = {\n            "name", "normalized_name", "source_kind", "source_label", "clinic_type",\n            "services", "categories", "address", "city", "admin_area", "country",\n            "postal_code", "lat", "lng", "phone", "website", "source_url",\n            "confidence_score", "status", "raw_source_data", "created_at",\n            "updated_at", "last_seen",\n        }\n        app = build_app_values(columns, values)\n        self.assertEqual(app["status"], "candidate")\n        self.assertEqual(app["admin_area"], "Ontario")\n        self.assertEqual(app["clinic_type"], "occupational medicine")\n        self.assertEqual(app["services"], ["occupational medicine"])\n        self.assertEqual(app["source_url"], "https://directory.example/central")\n        self.assertEqual(app["source_kind"], "pasted_url_scrape")\n        self.assertEqual(app["source_label"], "canada_registry")\n        self.assertIsInstance(app["raw_source_data"], psycopg2.extras.Json)\n\n\nif __name__ == "__main__":\n    unittest.main()\n''')

          workflow = Path('.github/workflows/app-candidate-mapping-fix.yml')
          workflow.unlink()
          PY
      - name: Install dependencies
        run: |
          npm ci
          python -m pip install -r scrapers/requirements.txt
      - name: Validate
        run: |
          npm run check
          npm run test:imports
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scrapers/network_sources/db.py tests/test_app_candidate_mapping.py .github/workflows/app-candidate-mapping-fix.yml
          git commit -m "Fix final provider candidate mapping"
          git push origin HEAD:agent/fix-final-provider-candidate-mapping
