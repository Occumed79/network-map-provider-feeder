name: Validate provider feeder

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scrapers/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install crawler dependencies
        run: python -m pip install -r scrapers/requirements.txt

      - name: Validate source syntax
        run: npm run check

      - name: Run provider ingestion tests
        run: npm run test:imports
