services:
  - type: web
    name: network-map-provider-feeder
    runtime: docker
    plan: standard
    branch: main
    
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: SCRAPER_MODE
        value: binary
      - key: SCRAPER_BINARY
        value: google-maps-scraper
      - key: DISABLE_TELEMETRY
        value: 1
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/browsers
      - key: PLAYWRIGHT_DRIVER_PATH
        value: /opt/ms-playwright-go/1.57.0
      - key: PLAYWRIGHT_NODEJS_PATH
        value: /usr/bin/node
      - key: VALIDATE_SCHEMA_ON_START
        value: 1
      - key: AUTO_SEED_ON_START
        value: 1
      - key: MIN_PENDING_JOBS
        value: 25
      - key: MAX_AUTO_SEED_JOBS
        value: 250
      - key: RESET_STALE_RUNNING_MINUTES
        value: 120
      - key: DEFAULT_CONCURRENCY
        value: 1
      - key: MAX_JOBS_PER_LOOP
        value: 1
      - key: SCRAPER_TIMEOUT_MS
        value: 300000
      - key: DATABASE_URL
        fromDatabase:
          name: network-map-postgres
          property: connectionString
    
    # Health check (worker will exit if job polling fails)
    healthCheckPath: /health
    healthCheckTimeout: 300
    
    # Resource allocation
    numInstances: 1
    
    # Build configuration
    dockerfile: ./Dockerfile
    dockerCommand: npm run worker
