services:
  - type: web
    name: network-map-provider-feeder
    runtime: docker
    plan: standard
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISABLE_TELEMETRY
        value: 1
      - key: ENABLE_SCHEMA_BOOTSTRAP
        value: 1
      - key: VALIDATE_SCHEMA_ON_START
        value: 1
      - key: DASHBOARD_SHOW_LEGACY
        value: 0
      - key: APP_CANDIDATE_TABLE
        value: provider_candidates
      - key: ENABLE_APP_CANDIDATE_WRITE
        value: 1
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /health
    healthCheckTimeout: 300
    numInstances: 1
    dockerfile: ./Dockerfile
    dockerCommand: npm run worker
